services:
  mysql-media:
    image: mysql:8.0
    container_name: mysql-media
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: media_db
      MYSQL_USER: media
      MYSQL_PASSWORD: media123
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot123"]
      interval: 10s
      timeout: 5s
      retries: 10

  media-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: media-backend
    depends_on:
      mysql-media:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-media:3306/media_db
      SPRING_DATASOURCE_USERNAME: media
      SPRING_DATASOURCE_PASSWORD: media123
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    ports:
      - "8081:8081"

  streamlit:
    build:
      context: ./streamlit-app
      dockerfile: Dockerfile
    container_name: media-streamlit
    depends_on:
      - media-backend
    environment:
      API_BASE_URL: http://media-backend:8081
    ports:
      - "8501:8501"

volumes:
  mysql_data: